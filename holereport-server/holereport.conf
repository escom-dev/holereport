<VirtualHost *:80>
    ServerName hrep.haskovo.org
    DocumentRoot /var/www/hrep.haskovo.org/web/public

    <Directory /var/www/hrep.haskovo.org/web/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Upload directory - no PHP execution for security
    <Directory /var/www/hrep.haskovo.org/web/uploads>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
        php_flag engine off
        AddType text/plain .php .phtml .php3 .php4 .php5 .php7 .phar
    </Directory>

    # API endpoint
    Alias /api /var/www/hrep.haskovo.org/web/api

    <Directory /var/www/hrep.haskovo.org/web/api>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # Increase upload limits for images
    php_value upload_max_filesize 30M
    php_value post_max_size 35M
    php_value max_execution_time 120
    php_value memory_limit 128M

    ErrorLog ${APACHE_LOG_DIR}/hrep.haskovo.org_error.log
    CustomLog ${APACHE_LOG_DIR}/hrep.haskovo.org_access.log combined
</VirtualHost>

